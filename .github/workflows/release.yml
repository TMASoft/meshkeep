name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign signing + build provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr paths must be lowercase; github.repository can carry mixed case
      - name: Resolve image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          # latest is added automatically for non-prerelease semver tags
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # moving prerelease tag so compose files can pin :beta
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # attach SLSA provenance + an SBOM as OCI attestations to the image
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.10.1

      # keyless signature bound to this workflow's OIDC identity; verify with
      # cosign verify --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign image (keyless)
        env:
          IMAGE_DIGEST: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_DIGEST"

      # everything below is post-publish reporting; the image is already pushed
      # and signed, so a transient hiccup here must not fail the release
      - name: Generate SBOM artifact (SPDX)
        continue-on-error: true
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Vulnerability scan (Trivy)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.img.outputs.name }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          # report-only: a newly disclosed CVE must not block shipping a release
          exit-code: "0"

      - name: Upload supply-chain artifacts
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-${{ github.ref_name }}
          path: |
            sbom.spdx.json
            trivy-results.sarif
          if-no-files-found: warn
