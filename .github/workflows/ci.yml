name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # mirror the Dockerfile: skip lifecycle scripts, then rebuild the native deps
      - run: npm ci --ignore-scripts
      - run: npm rebuild better-sqlite3 @serialport/bindings-cpp esbuild

      # server and web resolve @meshkeep/shared from its dist/
      - run: npm run build --workspace @meshkeep/shared

      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # the mock radio (host side of the smoke test) is standalone and runs from
      # source via tsx; mirror the Dockerfile's script policy, then give tsx a
      # working esbuild binary
      - run: npm ci --ignore-scripts
      - run: npm rebuild esbuild

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          load: true
          tags: meshkeep:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # boot the image wired to the mock radio; assert probes, UI, and a live link
      - name: Boot smoke test
        run: IMAGE=meshkeep:smoke scripts/smoke-test.sh
