# BEST-EFFORT: server-side BLE requires a Linux host running BlueZ
# (bluetoothd) and does NOT work on Docker Desktop for macOS/Windows.
# Pair the radio ONCE on the host first (companion BLE firmware defaults to
# PIN 123456) so BlueZ holds the bond, e.g. in bluetoothctl:
#   scan on ... pair AA:BB:CC:DD:EE:FF ... trust AA:BB:CC:DD:EE:FF
# USB (compose.usb.yml) and ser2net/TCP (compose.tcp.yml) remain the
# recommended server transports.
services:
  meshkeep:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: meshkeep:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MESHKEEP_CONNECTION: ble
      MESHKEEP_BLE_ADDRESS: "AA:BB:CC:DD:EE:FF"  # radio's BLE MAC
      # MESHKEEP_UI_PASSWORD: change-me
    volumes:
      - meshkeep-data:/data
      # BlueZ is reached over the host's system D-Bus
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro

volumes:
  meshkeep-data:
