# The radio is attached to another machine (e.g. a Pi) running ser2net,
# or a WiFi companion firmware exposing TCP. See ser2net.yaml.example.
#
# This is a sanitized EXAMPLE. Copy it to an untracked file and edit for your
# host:  cp docker/compose.tcp.yml compose.yml   (compose.yml is gitignored)
# Put secrets in a sibling .env file (gitignored); see docker/.env.example.
services:
  meshkeep:
    # Pin a released version, or an @sha256 digest for a fully immutable deploy.
    # The moving :beta tag tracks the latest prerelease — avoid it in production.
    image: ghcr.io/tmasoft/meshkeep:0.1.4-beta.3
    # image: ghcr.io/tmasoft/meshkeep@sha256:<digest>   # fully reproducible
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MESHKEEP_CONNECTION: tcp
      MESHKEEP_TCP_HOST: 192.168.1.50   # host running ser2net / WiFi companion
      MESHKEEP_TCP_PORT: "5000"
      # require login: set MESHKEEP_UI_PASSWORD in .env (never commit it).
      # empty/unset = open (LAN use).
      MESHKEEP_UI_PASSWORD: ${MESHKEEP_UI_PASSWORD:-}
    volumes:
      - meshkeep-data:/data

volumes:
  meshkeep-data:
