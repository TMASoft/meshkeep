# Recommended setup: the companion radio is plugged into this host over USB.
# Find a stable device path with: ls -l /dev/serial/by-id/
#
# This is a sanitized EXAMPLE. Copy it to an untracked file and edit for your
# host:  cp docker/compose.usb.yml compose.yml   (compose.yml is gitignored)
# Put secrets in a sibling .env file (gitignored); see docker/.env.example.
services:
  meshkeep:
    # Pin a released version, or an @sha256 digest for a fully immutable deploy.
    # The moving :beta tag tracks the latest prerelease — avoid it in production.
    # Building from source instead? See "Development" in the README.
    image: ghcr.io/tmasoft/meshkeep:0.1.4-beta.4
    # image: ghcr.io/tmasoft/meshkeep@sha256:<digest>   # fully reproducible
    restart: unless-stopped
    ports:
      - "8080:8080"
    devices:
      # replace with your radio's /dev/serial/by-id/... path, e.g.
      # /dev/serial/by-id/usb-RAKwireless_WisCore_RAK4631_Board_XXXXXXXXXXXXXXXX-if00
      - /dev/serial/by-id/usb-your-radio-if00:/dev/ttyMESH
    # numeric group that owns the serial device on THIS host:
    #   stat -c '%g' /dev/serial/by-id/usb-your-radio-if00
    # (often dialout=20 on Debian/Ubuntu, uucp on Arch)
    group_add:
      - "20"
    environment:
      MESHKEEP_CONNECTION: serial
      MESHKEEP_SERIAL_PORT: /dev/ttyMESH
      # require login: set MESHKEEP_UI_PASSWORD in .env (never commit it).
      # empty/unset = open (LAN use).
      MESHKEEP_UI_PASSWORD: ${MESHKEEP_UI_PASSWORD:-}
      # MESHKEEP_MAP_REFRESH_MINUTES: "10"
    volumes:
      - meshkeep-data:/data
      # host udev database so Radio → Connection can list USB radios by name;
      # detection degrades to manual entry without it
      - /run/udev:/run/udev:ro

volumes:
  meshkeep-data:
